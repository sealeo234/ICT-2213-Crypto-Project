{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="glass-card p-10">
        <h2 class="text-3xl font-bold mb-2">Welcome Back</h2>
        <p class="text-slate-400 mb-8 text-sm">Please authenticate to access your files.</p>
        
        <form method="POST" class="flex flex-col gap-6">
            <div class="flex flex-col gap-2">
                <label class="text-xs uppercase tracking-widest font-bold text-slate-500">Username</label>
                <input type="text" name="username" placeholder="cyber_ghost_01" required>
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-xs uppercase tracking-widest font-bold text-slate-500">Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary mt-4">Unlock Vault</button>
        </form>
        
        <p class="mt-8 text-center text-sm text-slate-500">
            No access key? <a href="/register" class="text-blue-400 hover:underline">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
